steps:
  # 1. بناء صورة الـ Docker باستخدام الملف الذي أنشأناه
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        CLEAN_URL=$(printf "%s" "$$SUPABASE_URL" | xargs)
        CLEAN_KEY=$(printf "%s" "$$SUPABASE_ANON_KEY" | xargs)
        docker build -t gcr.io/$PROJECT_ID/cvpro-crm-app:$COMMIT_SHA \
          --build-arg VITE_SUPABASE_URL=$$CLEAN_URL \
          --build-arg VITE_SUPABASE_ANON_KEY=$$CLEAN_KEY \
          --build-arg VITE_PROXY_HEADER=cvpro-crm-secure-key-2025 \
          .
    secretEnv: ['SUPABASE_URL', 'SUPABASE_ANON_KEY']

  # 2. تطبيق هجرات قاعدة البيانات (Supabase Migrations)
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # 1. تهيئة بناء نظيف ومجلد الهجرات
        rm -rf supabase && npx supabase init
        mkdir -p supabase/migrations
        cp frontend/supabase_schema.sql supabase/migrations/20240520000000_initial_schema.sql

        # 2. تنظيف الرابط من أي فراغات خفية
        CLEAN_DB_URL=$(printf "%s" "$$SUPABASE_DB_URL" | xargs)

        # 3. تنفيذ الهجرة (تأكد من استخدام المنفذ 5432 في Secret Manager)
        yes | npx supabase db push --db-url "$$CLEAN_DB_URL"
    secretEnv: ['SUPABASE_DB_URL']

  # 3. رفع الصورة إلى سجل الحاويات (Google Container Registry)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cvpro-crm-app:$COMMIT_SHA']

  # 4. نشر الصورة على Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'genai-app-cvproaiomnichannelcrm' # اسم الخدمة لديك
      - '--image'
      - 'gcr.io/$PROJECT_ID/cvpro-crm-app:$COMMIT_SHA'
      - '--region'
      - 'me-west1' # المنطقة الأقرب للشرق الأوسط
      - '--allow-unauthenticated'
      - '--platform'
      - 'managed'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=3600'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=me-west1,PROXY_HEADER=cvpro-crm-secure-key-2025'
      # ملاحظة: PROXY_HEADER يفضل إضافته يدوياً في لوحة التحكم أو تمريره كسر أيضاً

options:
  logging: CLOUD_LOGGING_ONLY

# ربط المتغيرات بأسماء الأسرار في Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_URL/versions/latest
      env: 'SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_ANON_KEY/versions/latest
      env: 'SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_DB_URL/versions/latest
      env: 'SUPABASE_DB_URL'